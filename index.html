    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tareas - Isaac</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#000000,#1a0033,#4b0082);
            min-height:100vh;
            padding:40px;
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:10px;
            text-shadow: 0 0 15px #bb86fc;
            font-size:3rem;
        }

        p{
            text-align:center;
            color:#d8d8d8;
            margin-bottom:40px;
        }

        .contenedor{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
            max-width:900px;
            margin:auto;
        }

        .tarjeta{
            background:rgba(20,20,20,0.9);
            border:2px solid #9d4edd;
            border-radius:20px;
            padding:25px;
            text-align:center;
            box-shadow:0 0 20px rgba(157,78,221,.6);
            transition:.3s;
        }

        .tarjeta:hover{
            transform:translateY(-10px) scale(1.03);
            box-shadow:0 0 35px rgba(157,78,221,.9);
        }

        .tarjeta h2{
            color:#c77dff;
            margin-bottom:15px;
            text-shadow:0 0 10px #c77dff;
        }

        .tarjeta p{
            color:#cccccc;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:linear-gradient(90deg,#7b2cbf,#9d4edd);
            color:white;
            padding:12px 25px;
            border-radius:30px;
            transition:.3s;
            font-weight:bold;
        }

        .btn:hover{
            box-shadow:0 0 20px #c77dff;
            transform:scale(1.05);
        }

        .firma{
            margin-top:40px;
            color:#9d4edd;
            text-align:center;
            font-size:14px;
        }
    </style>
</head>
<body>

    <h1> Mis Tareas y Proyectos</h1>
    <p>Repositorio académico de Isaac Esteban Acapana Samaniego</p>

    <div class="contenedor">

        <div class="tarjeta">
            <h2>🎬 Video de Blender 1</h2>
            <p>Proyecto realizado en Blender.</p>
            <a href="./VIDEO/0001-0100.mp4" class="btn">
                ▶ Ver video
            </a>
        </div>

    </div>
    <div class="contenedor">

        <div class="tarjeta">
            <h2>🎬 Video de Blender 2</h2>
            <p>Proyecto realizado en Blender.</p>
            <a href="./VIDEO/video asset.mp4" class="btn">
                ▶ Ver video
            </a>
        </div>

    </div>

    <div class="firma">
        "Modo Diablo" ⚡
    </div>

</body>
</html>
</head>
